version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
    depends_on:
      - user-service
      - profile-service
      - availability-service
      - matching-service
      - session-service
      - notification-service
      - messaging-service

  user-service:
    build: ./services/user-service
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - DATABASE_URL=${DATABASE_URL_USER}
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka

  profile-service:
    build: ./services/profile-service
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - DATABASE_URL=${DATABASE_URL_PROFILE}
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka

  availability-service:
    build: ./services/availability-service
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - DATABASE_URL=${DATABASE_URL_AVAILABILITY}
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka

  matching-service:
    build: ./services/matching-service
    ports:
      - "4004:4004"
    environment:
      - PORT=4004
      - DATABASE_URL=${DATABASE_URL_MATCHING}
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka

  session-service:
    build: ./services/session-service
    ports:
      - "4005:4005"
    environment:
      - PORT=4005
      - DATABASE_URL=${DATABASE_URL_SESSION}
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka

  notification-service:
    build: ./services/notification-service
    ports:
      - "4006:4006"
    environment:
      - PORT=4006
      - DATABASE_URL=${DATABASE_URL_NOTIFICATION}
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka

  messaging-service:
    build: ./services/messaging-service
    ports:
      - "4007:4007"
    environment:
      - PORT=4007
      - DATABASE_URL=${DATABASE_URL_MESSAGING}
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka